#-------------------------------------
#       T E S T environment
#-------------------------------------

# ============================================================
# Attention: Annotate test class with @ActiveProfiles("test").
# ============================================================


spring.datasource.url = jdbc:mariadb://localhost:3306/grafioschtrader_t
spring.datasource.username = grafioschtrader_t
spring.datasource.password = grafioschtrader_t


# FLYWAY (FlywayProperties)
#-------------------------------------
# Bootstrap grafioschtrader_t from empty via V1__schema.sql + V2__testdata.sql +
# V3__seed_connector_apikey (Java migration).
# Legacy populated DBs (no flyway_schema_history yet) are baselined at version 2
# so only V3 applies on first run, avoiding duplicate-key failures on V1/V2
# against pre-existing master data.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/test
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
# V1/V2 are regenerated snapshots produced by nv.bat on every release cut, so
# their checksums legitimately change. Skip validation to avoid spurious
# failures against a persisted grafioschtrader_t.
spring.flyway.validate-on-migrate=false

# Async Execution
#-------------------------------------
gt.security.async.historyquotes=false

# RestTestClient HTTP timeouts
#-------------------------------------
# The default 10s is too short for POST /api/security in this test: with
# gt.security.async.historyquotes=false the server synchronously loads historical
# quotes from the instrument connector during creation, which for some exchanges
# (Vienna / Wiener Boerse) can take longer than 10s.
spring.http.client.connect-timeout=10s
spring.http.client.read-timeout=60s


# Limit Data
#-------------------------------------
# GT has bandwidth limits to avoid an overuse, it may be disabled for tests  
gt.limit.request=false


# GreenMail in-process SMTP server (port 3025 is GreenMail's default for tests)
spring.mail.host=localhost
spring.mail.port=3025
# Use a placeholder sender address (still a valid email) so MailExternalService
# can build InternetAddress, while overriding the production credentials so that
# JavaMailSender does not attempt SMTP AUTH against GreenMail.
spring.mail.username=noreply@test.local
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false


logging.level.grafioschtrader.connector.instrument.ecb = INFO
logging.level.grafioschtrader.connector.yahoo.YahooSymbolSearch = INFO
logging.level.org.springframework.security=DEBUG