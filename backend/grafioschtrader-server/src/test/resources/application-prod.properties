#-------------------------------------
#   P R O D   D B   (read against real grafioschtrader, NO Flyway)
#-------------------------------------
# Use ONLY when grafioschtrader_t is not yet prepared. Targets the real database but
# disables Flyway entirely so NO migration (and in particular no destructive test
# bootstrap from db/migration/test) can ever run against it.
#
# As a profile-specific config file this outranks both base application.properties and
# the @PropertySource("application-test.properties") in GTforTest, so spring.flyway.enabled
# below wins and nothing migrates even though GTforTest still injects the test Flyway location.

spring.datasource.url = jdbc:mariadb://localhost:3306/grafioschtrader
spring.datasource.username = grafioschtrader
# Password is inherited (ENC) from application.properties and decrypted by Jasypt ->
# run with JASYPT_ENCRYPTOR_PASSWORD set, exactly like launching the application.

# The single, decisive safety guarantee for this profile:
spring.flyway.enabled = false

# Behave like the test profile for synchronous reads and bandwidth limits.
gt.security.async.historyquotes = false
gt.limit.request = false
