#-------------------------------------
#       E 2 E  test environment
#-------------------------------------
# Start with:  mvn -pl grafioschtrader-server spring-boot:test-run -Dspring-boot.run.profiles=e2e
# The test-run goal puts src/test/resources on the classpath so Flyway can find
# db/migration/test/V1__schema.sql + V2__testdata.sql.
# Requires MailHog running on localhost (SMTP 1025, Web UI 8025).

# Reuse the same DB that JUnit integration tests use.
spring.datasource.url=jdbc:mariadb://localhost:3306/grafioschtrader_t
spring.datasource.username=grafioschtrader_t
spring.datasource.password=grafioschtrader_t

# Reuse the same squashed migration set as the integration tests.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/test
spring.flyway.baseline-on-migrate=true

# MailHog test mail server (SMTP on port 1025, Web UI on port 8025)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=noreply@test.local
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false

# Disable request rate limiting for E2E tests
gt.limit.request=false
