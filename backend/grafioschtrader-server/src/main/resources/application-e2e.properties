#-------------------------------------
#       E 2 E  test environment
#-------------------------------------
# Use with: --spring.profiles.active=e2e
# Requires MailHog running on localhost (MailHog_windows_amd64.exe)

# MailHog test mail server (SMTP on port 1025, Web UI on port 8025)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false

# Disable request rate limiting for E2E tests
gt.limit.request=false
