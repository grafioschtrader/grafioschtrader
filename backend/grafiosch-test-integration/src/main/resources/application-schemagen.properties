# Profile activated by generate-grafioschbase-sql.bat to dump the shared-base
# schema from the JPA model. Hibernate creates the schema; SchemaGenExitRunner
# then exits the application so the .bat can mysqldump and clean up.

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

spring.flyway.enabled=false
spring.main.web-application-type=none
